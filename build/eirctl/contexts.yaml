---
# yaml-language-server: $schema=https://raw.githubusercontent.com/Ensono/eirctl/refs/heads/main/schemas/schema_v1.json

contexts:
  powershell:
    container:
      name: ensono/eir-infrastructure:1.2.22
      shell: pwsh
      shell_args: [
        "-NonInteractive",
        "-Command"
      ]
    env:
      PSModulePath: /modules
    envfile:
      exclude:
        - PATH
        - SOURCEVERSIONMESSAGE
        - HOME

  # Host context for the Terraform fast test tier (static + contract). Requires
  # `terraform` (>= 1.7 for mock_provider) on the executing agent. The fast tier
  # does not run Go suites, so `go` is not required here.
  terraform-test:
    executable:
      bin: /bin/bash
      args:
        - -c
    env:
      TF_IN_AUTOMATION: "1"
