---
extends: default

yaml-files:
  - 'yamllint.conf'
  - '*.yml'
  - '*.yaml'

ignore: |
  .terraform/
  .eirctl/
  local/
  outputs/
  tmp/
  openspec/


rules:
  line-length: disable
  truthy: disable
  indentation:
    spaces: 2
    indent-sequences: whatever
    check-multi-line-strings: false
